<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>TravelTech Multi-cloud</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>TravelTech Planner</h1>
    
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Cerca un país (ex: Spain)">
        <button onclick="searchCountry()">Cercar</button>
    </div>

    <div id="result" class="card"></div>

    <div class="services-section">
        <div class="service-card">
            <h3>Favorites ⭐️</h3>
            <button onclick="getServiceData('favorites')">Veure</button>
            <ul id="favorites-list"></ul>
        </div>
        <div class="service-card">
            <h3>Wishlist 🗺️</h3>
            <button onclick="getServiceData('wishlist')">Veure</button>
            <ul id="wishlist-list"></ul>
        </div>
        <div class="service-card">
            <h3>Visited ✈️</h3>
            <button onclick="getServiceData('visited')">Veure</button>
            <ul id="visited-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
